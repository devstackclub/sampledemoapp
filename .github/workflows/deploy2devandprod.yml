
name: Deploy to Azure App Service (OIDC) - Dev then Prod

on:
  # Auto-run after the build workflow finishes
  workflow_run:
    workflows: ["Build .NET 8 App Sample"]   # <-- MUST match the build workflow "name:"
    types: [completed]

  # Manual trigger (optional): allow promoting a specific build run
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build workflow run_id to deploy (optional). Leave empty to deploy latest successful run."
        required: false

permissions:
  contents: read
  actions: read       # required to download artifacts from another workflow run
  id-token: write     # required for Azure OIDC login

env:
  ARTIFACT_NAME: drop
  ZIP_NAME: MyModernApp.zip

  # App Service names
  AZURE_WEBAPP_NAME_DEV: sampledemors-dev2
  AZURE_WEBAPP_NAME_PROD: sampledemo-rs2

jobs:
  resolve-run:
    name: Resolve build run to deploy
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.set.outputs.run_id }}
    steps:
      - name: Determine run_id
        id: set
        uses: actions/github-script@v7
        with:
          script: |
            // If manually provided run_id, use it
            const inputRunId = core.getInput('run_id');
            if (inputRunId) {
              core.setOutput('run_id', inputRunId);
              return;
            }

            // If triggered via workflow_run, use that run id
            if (context.eventName === 'workflow_run') {
              core.setOutput('run_id', context.payload.workflow_run.id.toString());
              return;
            }

            // Otherwise pick latest successful run of the build workflow
            // (Uses build workflow name; GitHub API lists workflow runs)
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find the workflow by name
            const workflows = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const wf = workflows.data.workflows.find(w => w.name === "Build .NET 8 App");
            if (!wf) {
              core.setFailed('Could not find workflow named "Build .NET 8 App". Check build workflow name.');
              return;
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: wf.id,
              status: "completed",
              per_page: 20
            });

            const latestSuccess = runs.data.workflow_runs.find(r => r.conclusion === "success");
            if (!latestSuccess) {
              core.setFailed("No successful build runs found.");
              return;
            }

            core.setOutput('run_id', latestSuccess.id.toString());

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: resolve-run
    environment:
      name: dev
    steps:
      - name: Download artifact from build workflow run
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          run-id: ${{ needs.resolve-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact
        run: |
          echo "Downloaded files:"
          ls -lah
          test -f "${{ env.ZIP_NAME }}" || (echo "ZIP not found: ${{ env.ZIP_NAME }}" && exit 1)

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ZIP to DEV App Service (Windows)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_DEV }}
          package: ${{ env.ZIP_NAME }}

  deploy-prod:
    name: Deploy to PROD (requires approval)
    runs-on: ubuntu-latest
    needs: [resolve-run,deploy-dev]
    environment:
      name: prod   # <-- set required reviewers in GitHub Environments for approval
    steps:
      - name: Download artifact from build workflow run
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          run-id: ${{ needs.resolve-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact
        run: |
          echo "Downloaded files:"
          ls -lah
          test -f "${{ env.ZIP_NAME }}" || (echo "ZIP not found: ${{ env.ZIP_NAME }}" && exit 1)

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ZIP to PROD App Service (Windows)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PROD }}
          package: ${{ env.ZIP_NAME }}
