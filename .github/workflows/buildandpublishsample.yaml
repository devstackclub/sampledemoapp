
name: Build .NET 8 App Sample

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -c Release -o publish

    - name: Zip artifact
      run: zip -r MyModernApp.zip publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: MyModernApp.zip
